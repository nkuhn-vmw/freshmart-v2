<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshMart - Fresh Groceries Delivered</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F6D2;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
header{background:#2d7d46;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
.logo span{margin-right:6px}
.search-bar{flex:0 1 400px;position:relative}
.search-bar input{width:100%;padding:10px 14px 10px 38px;border:none;border-radius:24px;font-size:.95rem;outline:none}
.search-bar::before{content:'\1F50D';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem}
.cart-btn{background:none;border:none;cursor:pointer;position:relative;font-size:1.5rem;color:#fff}
.cart-badge{position:absolute;top:-6px;right:-10px;background:#ff6b35;color:#fff;border-radius:50%;width:20px;height:20px;font-size:.7rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.categories{display:flex;gap:8px;padding:14px 24px;overflow-x:auto;background:#fff;border-bottom:1px solid #e0e0e0}
.categories::-webkit-scrollbar{display:none}
.cat-pill{padding:8px 16px;border-radius:20px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;white-space:nowrap;font-size:.85rem;font-weight:500;transition:all .2s}
.cat-pill:hover{background:#e8f5e9}
.cat-pill.active{background:#2d7d46;color:#fff;border-color:#2d7d46}
main{flex:1;padding:24px;max-width:1280px;margin:0 auto;width:100%}
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
@media(max-width:1024px){.product-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.product-grid{grid-template-columns:repeat(2,1fr)}.search-bar{flex:0 1 200px}}
@media(max-width:480px){.product-grid{grid-template-columns:1fr}.logo{font-size:1.2rem}.search-bar{display:none}}
.card{background:#fff;border-radius:12px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;cursor:default}
.card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-emoji{font-size:64px;margin:8px 0 12px}
.card-name{font-weight:700;font-size:1rem;margin-bottom:4px}
.card-cat{display:inline-block;background:#eee;color:#666;padding:2px 10px;border-radius:10px;font-size:.75rem;margin-bottom:8px}
.card-price{font-size:1.4rem;font-weight:800;color:#2d7d46;margin-bottom:6px}
.stock-ok{color:#2d7d46;font-size:.78rem;margin-bottom:10px}
.stock-low{color:#ff6b35;font-size:.78rem;margin-bottom:10px}
.add-btn{background:#ff6b35;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.9rem;width:100%;transition:background .2s}
.add-btn:hover{background:#e55a28}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;right:-400px;width:380px;max-width:90vw;height:100%;background:#fff;z-index:201;transition:right .3s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
.sidebar.open{right:0}
.sidebar-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #eee}
.sidebar-header h2{font-size:1.2rem}
.close-btn{background:none;border:none;font-size:1.4rem;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.cart-item-emoji{font-size:2rem}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:.9rem}
.cart-item-price{color:#2d7d46;font-weight:600;font-size:.85rem}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#f0f0f0}
.cart-footer{padding:16px 20px;border-top:1px solid #eee}
.subtotal{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.checkout-btn{width:100%;padding:14px;background:#2d7d46;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.checkout-btn:hover{background:#236638}
.empty-cart{text-align:center;padding:40px 0;color:#999}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:18px;font-size:1.3rem}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-weight:600;margin-bottom:4px;font-size:.9rem}
.form-group input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:.95rem}
.order-summary{background:#f9f9f9;padding:14px;border-radius:8px;margin:18px 0}
.order-summary-item{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:4px}
.order-total{display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;border-top:1px solid #ddd;padding-top:8px;margin-top:8px}
.place-order-btn{width:100%;padding:14px;background:#2d7d46;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px}
.place-order-btn:hover{background:#236638}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;float:right}
.success-msg{text-align:center;padding:20px}
.success-msg .check{font-size:3rem;margin-bottom:12px}
.success-msg h3{color:#2d7d46;margin-bottom:8px}
footer{background:#333;color:#aaa;text-align:center;padding:20px;font-size:.85rem;margin-top:auto}
footer a{color:#ccc;margin:0 8px;text-decoration:none}
footer a:hover{color:#fff}
</style>
</head>
<body>

<header>
  <div class="logo"><span>&#x1F6D2;</span> FreshMart</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>
  <button class="cart-btn" id="cartToggle" aria-label="Shopping cart">
    &#x1F6D2;
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="categories" id="categories"></div>

<main>
  <div class="product-grid" id="productGrid"></div>
</main>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Your Cart</h2>
    <button class="close-btn" id="sidebarClose">&times;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="subtotal"><span>Subtotal</span><span id="cartTotal">$0.00</span></div>
    <button class="checkout-btn" id="checkoutBtn">Checkout</button>
  </div>
</div>

<div class="modal-overlay" id="checkoutModal">
  <div class="modal" id="modalContent"></div>
</div>

<footer>
  <div>Powered by jclaw &#x1F916;</div>
  <div style="margin-top:8px">
    <a href="#">About</a>
    <a href="#">Contact</a>
    <a href="#">Privacy</a>
  </div>
</footer>

<script>
(function(){
  let products = [];
  let cartId = localStorage.getItem('freshmart-cartId') || null;
  let cart = [];
  let activeCategory = 'ALL';

  const grid = document.getElementById('productGrid');
  const badge = document.getElementById('cartBadge');
  const cartItemsEl = document.getElementById('cartItems');
  const cartFooter = document.getElementById('cartFooter');
  const cartTotalEl = document.getElementById('cartTotal');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const modal = document.getElementById('checkoutModal');
  const modalContent = document.getElementById('modalContent');
  const searchInput = document.getElementById('searchInput');
  const categoriesEl = document.getElementById('categories');

  async function ensureCart(){
    if(!cartId){
      const resp = await fetch('/api/cart',{method:'POST'});
      const data = await resp.json();
      cartId = data.cartId;
      localStorage.setItem('freshmart-cartId', cartId);
    }
    return cartId;
  }

  async function refreshCart(){
    if(!cartId){ cart=[]; updateBadge(); renderCart(); return; }
    try {
      const resp = await fetch('/api/cart/'+cartId);
      if(resp.ok) cart = await resp.json();
      else { cart=[]; cartId=null; localStorage.removeItem('freshmart-cartId'); }
    } catch(e){ cart=[]; }
    updateBadge();
    renderCart();
  }

  function renderCategories(){
    const cats = ['ALL','PRODUCE','DAIRY','BAKERY','MEAT','SEAFOOD','BEVERAGES','SNACKS','FROZEN','PANTRY','HOUSEHOLD'];
    const catEmojis = {ALL:'&#x1F6D2;',PRODUCE:'&#x1F34E;',DAIRY:'&#x1F95B;',BAKERY:'&#x1F35E;',MEAT:'&#x1F969;',SEAFOOD:'&#x1F41F;',BEVERAGES:'&#x1F9C3;',SNACKS:'&#x1F37F;',FROZEN:'&#x2744;&#xFE0F;',PANTRY:'&#x1F3FA;',HOUSEHOLD:'&#x1F9F1;'};
    categoriesEl.innerHTML = cats.map(function(c){
      return '<button class="cat-pill '+(activeCategory===c?'active':'')+'" data-cat="'+c+'">'+(catEmojis[c]||'')+' '+(c==='ALL'?'All':c.charAt(0)+c.slice(1).toLowerCase())+'</button>';
    }).join('');
    categoriesEl.querySelectorAll('.cat-pill').forEach(function(btn){
      btn.addEventListener('click', function(){
        activeCategory = btn.dataset.cat;
        fetchProducts();
      });
    });
  }

  async function fetchProducts(){
    try {
      var url = '/api/products';
      var q = searchInput.value.trim();
      if(q) url = '/api/products/search?q='+encodeURIComponent(q);
      else if(activeCategory !== 'ALL') url = '/api/products/category/'+activeCategory;
      var resp = await fetch(url);
      products = await resp.json();
    } catch(e){ products = []; }
    renderProducts();
    renderCategories();
  }

  function renderProducts(){
    if(!products.length){
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#999;padding:40px">No products found.</p>';
      return;
    }
    grid.innerHTML = products.map(function(p){
      var stock = p.stockQuantity < 5;
      return '<div class="card">'+
        '<div class="card-emoji">'+(p.emoji||'&#x1F4E6;')+'</div>'+
        '<div class="card-name">'+esc(p.name)+'</div>'+
        '<div class="card-cat">'+p.category+'</div>'+
        '<div class="card-price">$'+Number(p.price).toFixed(2)+'</div>'+
        '<div class="'+(stock?'stock-low':'stock-ok')+'">'+(stock?'&#x26A0;&#xFE0F; Low Stock':'&#x2705; In Stock')+'</div>'+
        '<button class="add-btn" onclick="window._addToCart('+p.id+')">Add to Cart</button>'+
      '</div>';
    }).join('');
  }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  window._addToCart = async function(id){
    var p = products.find(function(x){return x.id===id;});
    if(!p) return;
    await ensureCart();
    await fetch('/api/cart/'+cartId+'/items',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({productId:id, quantity:1})
    });
    await refreshCart();
    openSidebar();
  };

  function updateBadge(){
    var total = cart.reduce(function(s,i){return s+i.quantity;},0);
    badge.textContent = total;
    badge.style.display = total > 0 ? 'flex' : 'none';
  }

  async function fetchTotal(){
    if(!cartId) return 0;
    try {
      var resp = await fetch('/api/cart/'+cartId+'/total');
      var data = await resp.json();
      return Number(data.total);
    } catch(e){ return 0; }
  }

  function renderCart(){
    if(!cart.length){
      cartItemsEl.innerHTML = '<div class="empty-cart">&#x1F6D2; Your cart is empty</div>';
      cartFooter.style.display = 'none';
      return;
    }
    cartFooter.style.display = 'block';
    var localTotal = cart.reduce(function(s,i){return s+Number(i.price)*i.quantity;},0);
    cartTotalEl.textContent = '$' + localTotal.toFixed(2);
    cartItemsEl.innerHTML = cart.map(function(item){
      return '<div class="cart-item">'+
        '<div class="cart-item-emoji">'+(item.emoji||'&#x1F4E6;')+'</div>'+
        '<div class="cart-item-info">'+
          '<div class="cart-item-name">'+esc(item.productName)+'</div>'+
          '<div class="cart-item-price">$'+(Number(item.price)*item.quantity).toFixed(2)+'</div>'+
        '</div>'+
        '<div class="qty-controls">'+
          '<button class="qty-btn" onclick="window._changeQty('+item.productId+','+(item.quantity-1)+')">&minus;</button>'+
          '<span>'+item.quantity+'</span>'+
          '<button class="qty-btn" onclick="window._changeQty('+item.productId+','+(item.quantity+1)+')">+</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  window._changeQty = async function(productId, newQty){
    if(!cartId) return;
    if(newQty <= 0){
      await fetch('/api/cart/'+cartId+'/items/'+productId,{method:'DELETE'});
    } else {
      await fetch('/api/cart/'+cartId+'/items/'+productId,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({quantity:newQty})
      });
    }
    await refreshCart();
  };

  function openSidebar(){
    sidebar.classList.add('open');
    overlay.classList.add('open');
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }

  document.getElementById('cartToggle').addEventListener('click', openSidebar);
  document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
  overlay.addEventListener('click', closeSidebar);

  document.getElementById('checkoutBtn').addEventListener('click', function(){
    closeSidebar();
    showCheckoutForm();
  });

  async function showCheckoutForm(){
    var total = await fetchTotal();
    modal.classList.add('open');
    var summaryHtml = cart.map(function(i){
      return '<div class="order-summary-item"><span>'+esc(i.productName)+' x'+i.quantity+'</span><span>$'+(Number(i.price)*i.quantity).toFixed(2)+'</span></div>';
    }).join('');
    modalContent.innerHTML =
      '<button class="modal-close" onclick="document.getElementById(\'checkoutModal\').classList.remove(\'open\')">&times;</button>'+
      '<h2>Checkout</h2>'+
      '<div class="form-group"><label>Full Name</label><input type="text" id="coName" required></div>'+
      '<div class="form-group"><label>Email</label><input type="email" id="coEmail" required></div>'+
      '<div class="form-group"><label>Phone</label><input type="tel" id="coPhone"></div>'+
      '<div class="form-group"><label>Delivery Address</label><input type="text" id="coAddress" required></div>'+
      '<div class="order-summary">'+summaryHtml+
        '<div class="order-total"><span>Total</span><span>$'+total.toFixed(2)+'</span></div>'+
      '</div>'+
      '<button class="place-order-btn" id="placeOrderBtn">Place Order</button>';
    document.getElementById('placeOrderBtn').addEventListener('click', placeOrder);
  }

  async function placeOrder(){
    var name = document.getElementById('coName').value.trim();
    var email = document.getElementById('coEmail').value.trim();
    var phone = document.getElementById('coPhone').value.trim();
    var address = document.getElementById('coAddress').value.trim();
    if(!name || !email){alert('Please fill in name and email.');return;}

    try {
      var resp = await fetch('/api/orders/checkout',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({cartId:cartId, customerName:name, email:email, phone:phone, address:address})
      });
      var order = await resp.json();

      cart = [];
      cartId = null;
      localStorage.removeItem('freshmart-cartId');
      updateBadge();
      renderCart();

      modalContent.innerHTML =
        '<div class="success-msg">'+
          '<div class="check">&#x2705;</div>'+
          '<h3>Order Placed!</h3>'+
          '<p>Order ID: <strong>#'+order.id+'</strong></p>'+
          '<p style="color:#666;margin-top:4px">Total: <strong>$'+Number(order.total).toFixed(2)+'</strong></p>'+
          '<p style="color:#666;margin-top:8px">Thank you for shopping at FreshMart!</p>'+
          '<button class="place-order-btn" style="margin-top:20px" onclick="document.getElementById(\'checkoutModal\').classList.remove(\'open\')">Continue Shopping</button>'+
        '</div>';
      fetchProducts();
    } catch(e){
      alert('Checkout failed. Please try again.');
    }
  }

  var searchTimeout;
  searchInput.addEventListener('input', function(){
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function(){
      if(searchInput.value.trim()) activeCategory = 'ALL';
      fetchProducts();
    }, 300);
  });

  // Init
  refreshCart();
  renderCategories();
  fetchProducts();
})();
</script>
</body>
</html>
